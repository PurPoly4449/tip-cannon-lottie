<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tip Cannon Hover Animation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
    }

    .tip-button {
      position: relative;
      width: 120px;
      height: 120px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tip-button:focus-visible {
      outline: 3px solid #6d4aff;
      outline-offset: 4px;
    }

    .tip-button__preview,
    .tip-button__animation {
      position: absolute;
      inset: 0;
      width: 120px;
      height: 120px;
      display: block;
    }

    .tip-button__preview {
      object-fit: contain;
      visibility: visible;
    }

    .tip-button__animation {
      visibility: hidden;
      pointer-events: none;
    }

    .tip-button.is-animated .tip-button__preview {
      visibility: hidden;
    }

    .tip-button.is-animated .tip-button__animation {
      visibility: visible;
    }
  </style>
</head>
<body>
  <button class="tip-button" type="button" aria-label="Tip Cannon">
    <img class="tip-button__preview" src="./Png.png?v=20260707-6" alt="" draggable="false">
    <canvas class="tip-button__animation" width="960" height="960" aria-hidden="true"></canvas>
  </button>

  <script src="./tipcannon-data.js?v=20260707-6"></script>
  <script type="module">
    import { DotLottie } from "https://cdn.jsdelivr.net/npm/@lottiefiles/dotlottie-web/+esm";

    const button = document.querySelector(".tip-button");
    const canvas = document.querySelector(".tip-button__animation");

    const animationSource = location.protocol === "file:"
      ? window.TIP_CANNON_LOTTIE_DATA
      : "./TipCannon.lottie?v=20260707-6";

    const START_FRAME = 0;
    const HOLD_FRAME = 60;
    const ANIMATION_SPEED = 1.35;

    let isLoaded = false;
    let isHovering = false;

    const animation = new DotLottie({
      canvas,
      src: animationSource,
      autoplay: false,
      loop: false
    });

    function showAnimation() {
      button.classList.add("is-animated");
    }

    function showPreview() {
      button.classList.remove("is-animated");
    }

    function playForward() {
      isHovering = true;

      if (!isLoaded) return;

      showAnimation();
      animation.setSegment(START_FRAME, HOLD_FRAME);

      if (
        animation.currentFrame < START_FRAME ||
        animation.currentFrame > HOLD_FRAME
      ) {
        animation.setFrame(START_FRAME);
      }

      animation.setSpeed(ANIMATION_SPEED);
      animation.setMode("forward");
      animation.play();
    }

    function playBackward() {
      isHovering = false;

      if (!isLoaded) {
        showPreview();
        return;
      }

      showAnimation();
      animation.setSegment(START_FRAME, HOLD_FRAME);
      animation.setSpeed(ANIMATION_SPEED);
      animation.setMode("reverse");
      animation.play();
    }

    button.addEventListener("pointerenter", playForward);
    button.addEventListener("pointerleave", playBackward);
    button.addEventListener("focus", playForward);
    button.addEventListener("blur", playBackward);

    animation.addEventListener("load", () => {
      isLoaded = true;
      animation.setFrame(START_FRAME);

      if (isHovering) {
        playForward();
      }
    });

    animation.addEventListener("complete", () => {
      animation.pause();

      if (isHovering) {
        animation.setFrame(HOLD_FRAME);
        showAnimation();
      } else {
        animation.setSegment(START_FRAME, HOLD_FRAME);
        animation.setFrame(START_FRAME);
        showPreview();
      }
    });

    animation.addEventListener("loadError", () => {
      isLoaded = false;
      showPreview();
    });
  </script>
</body>
</html>
