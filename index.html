<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tip Cannon Hover Animation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
    }

    .tip-button {
      position: relative;
      width: 120px;
      height: 120px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tip-button:focus-visible {
      outline: 3px solid #6d4aff;
      outline-offset: 4px;
    }

    .tip-button__preview,
    .tip-button__animation {
      position: absolute;
      inset: 0;
      width: 120px;
      height: 120px;
      display: block;
    }

    .tip-button__preview {
      object-fit: contain;
      visibility: visible;
      transition: transform 180ms ease;
    }

    .tip-button__animation {
      visibility: hidden;
      pointer-events: none;
      overflow: visible;
    }

    .tip-button__animation svg {
      overflow: visible;
    }

    .tip-button:hover .tip-button__preview,
    .tip-button:focus-visible .tip-button__preview {
      transform: scale(1.04);
    }

    .tip-button.is-animated .tip-button__preview {
      visibility: hidden;
    }

    .tip-button.is-animated .tip-button__animation {
      visibility: visible;
    }
  </style>
</head>
<body>
  <button class="tip-button" type="button" aria-label="Tip Cannon">
    <img class="tip-button__preview" src="./Png.png?v=20260707-2" alt="" draggable="false">
    <div class="tip-button__animation" aria-hidden="true"></div>
  </button>

  <script src="./tipcannon-json-data.js?v=20260707-2"></script>
  <script>
    const button = document.querySelector(".tip-button");
    const container = document.querySelector(".tip-button__animation");

    const START_FRAME = 0;
    const HOLD_FRAME = 60;
    const SPEED = 1.25;

    let animation = null;
    let currentFrame = START_FRAME;
    let targetFrame = START_FRAME;
    let lastTime = null;
    let rafId = null;
    let isLoaded = false;
    let isHovering = false;

    function showAnimation() {
      button.classList.add("is-animated");
    }

    function showPreview() {
      button.classList.remove("is-animated");
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function loadLottiePlayer() {
      if (window.lottie) return window.lottie;

      const sources = [
        "https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js",
        "https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js",
        "https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"
      ];

      for (const src of sources) {
        try {
          await loadScript(src);
          if (window.lottie) return window.lottie;
        } catch (error) {
          console.warn("Не загрузился Lottie-плеер:", src, error);
        }
      }

      throw new Error("Lottie-плеер не загрузился ни с одного CDN.");
    }

    async function loadAnimationData() {
      if (window.TIP_CANNON_JSON_DATA) {
        return window.TIP_CANNON_JSON_DATA;
      }

      const response = await fetch("./TipCannon-site.json?v=20260707-2", {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("Не найден TipCannon-site.json");
      }

      return response.json();
    }

    function draw(frame) {
      if (!animation) return;

      currentFrame = Math.max(START_FRAME, Math.min(HOLD_FRAME, frame));
      animation.goToAndStop(currentFrame, true);
    }

    function stopTween() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      lastTime = null;
    }

    function animateTo(frame) {
      targetFrame = frame;
      stopTween();

      const tick = (time) => {
        if (lastTime === null) lastTime = time;

        const delta = ((time - lastTime) / 1000) * 60 * SPEED;
        lastTime = time;

        if (currentFrame < targetFrame) {
          draw(Math.min(targetFrame, currentFrame + delta));
        } else if (currentFrame > targetFrame) {
          draw(Math.max(targetFrame, currentFrame - delta));
        }

        if (Math.abs(currentFrame - targetFrame) > 0.01) {
          rafId = requestAnimationFrame(tick);
        } else {
          draw(targetFrame);
          rafId = null;
          lastTime = null;

          if (!isHovering && targetFrame === START_FRAME) {
            showPreview();
          }
        }
      };

      rafId = requestAnimationFrame(tick);
    }

    function playForward() {
      isHovering = true;
      if (!isLoaded) return;

      showAnimation();
      animateTo(HOLD_FRAME);
    }

    function playBackward() {
      isHovering = false;
      if (!isLoaded) {
        showPreview();
        return;
      }

      showAnimation();
      animateTo(START_FRAME);
    }

    button.addEventListener("pointerenter", playForward);
    button.addEventListener("pointerleave", playBackward);
    button.addEventListener("focus", playForward);
    button.addEventListener("blur", playBackward);

    async function init() {
      try {
        const [lottiePlayer, animationData] = await Promise.all([
          loadLottiePlayer(),
          loadAnimationData()
        ]);

        animation = lottiePlayer.loadAnimation({
          container,
          renderer: "svg",
          loop: false,
          autoplay: false,
          animationData,
          rendererSettings: {
            preserveAspectRatio: "xMidYMid meet",
            progressiveLoad: false
          }
        });

        animation.addEventListener("DOMLoaded", () => {
          isLoaded = true;
          draw(START_FRAME);

          if (isHovering) {
            playForward();
          }
        });

        animation.addEventListener("data_failed", () => {
          console.error("Lottie data failed");
          showPreview();
        });
      } catch (error) {
        console.error("Tip Cannon animation error:", error);
        showPreview();
      }
    }

    init();
  </script>
</body>
</html>
